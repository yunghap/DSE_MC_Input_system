<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 完整题库练习 · 导出HTML报告</title>
  <!-- 字体与库 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <!-- Chart.js 雷达图 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- SheetJS 生成 Excel -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <!-- MathJax 渲染数学公式 -->
  <script>
    MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      startup: { ready: () => MathJax.startup.defaultReady() }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f4f7fc;
      font-family: 'Inter', sans-serif;
      padding: 2rem 1rem;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    .app-container {
      max-width: 1300px;
      width: 100%;
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 40px -12px rgba(0,20,50,0.1);
      padding: 2rem 2rem 2.5rem;
      border: 1px solid #e6edf4;
    }
    h1 { font-weight: 600; font-size: 2rem; color: #0a2540; display: flex; gap: 8px; margin-bottom: 8px; }
    .subhead { color: #5b6f82; margin-bottom: 1.5rem; border-left: 4px solid #2b6eb3; padding-left: 1rem; }
    
    .mode-switch {
      display: flex;
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    .mode-btn {
      flex: 1;
      padding: 14px 20px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1.2rem;
      background: white;
      border: 2px solid #cbdae6;
      color: #3e546a;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .mode-btn.active {
      background: #0a2540;
      border-color: #0a2540;
      color: white;
      box-shadow: 0 6px 14px rgba(10,37,64,0.15);
    }
    
    .filter-bar {
      background: #f0f5fa; border-radius: 24px; padding: 1.5rem 1.8rem;
      display: flex; flex-wrap: wrap; align-items: flex-end; gap: 1.5rem 2.5rem;
      margin-bottom: 1rem;
    }
    .filter-group { display: flex; flex-direction: column; gap: 6px; min-width: 170px; }
    .filter-group label { font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.3px; color: #2c4c6e; }
    .filter-group select, .filter-group input {
      padding: 10px 14px; border: 1.5px solid #cbdae6; border-radius: 16px;
      background: white; font-family: 'Inter', sans-serif; font-size: 0.95rem;
    }
    .btn-primary {
      background: #0a2540; color: white; border: none; padding: 12px 28px;
      border-radius: 40px; font-weight: 600; font-size: 1rem; cursor: pointer;
      box-shadow: 0 6px 12px rgba(10,37,64,0.1); transition: 0.15s;
      border: 1px solid #1e3b5c; margin-left: auto;
    }
    .btn-primary:hover { background: #1e3b5c; }
    .btn-secondary {
      background: white; color: #1a5d9c; border: 1.5px solid #b7cadf;
      padding: 10px 20px; border-radius: 40px; font-weight: 500; cursor: pointer;
      margin-right: 8px;
    }
    .btn-success {
      background: #1e7e34; color: white; border: none; padding: 10px 20px;
      border-radius: 40px; font-weight: 500; cursor: pointer;
    }
    .btn-success:hover { background: #146b28; }
    .stats-info { margin: 0.5rem 0 1rem; color: #2e5a88; font-weight: 500; display: flex; justify-content: space-between; align-items: center; }
    
    .questions-wrapper {
      max-height: 600px;
      overflow-y: auto;
      padding-right: 8px;
      margin: 1.8rem 0;
      border-radius: 20px;
    }
    .questions-panel { display: flex; flex-direction: column; gap: 1.2rem; }
    .question-card {
      background: #fff; border: 1px solid #e2e9f2; border-radius: 20px;
      padding: 1.2rem 1.8rem; display: flex; flex-direction: column; gap: 0.8rem;
    }
    .q-header {
      display: flex; align-items: center; flex-wrap: wrap; gap: 1.5rem;
    }
    .q-meta { min-width: 220px; }
    .q-tag { font-weight: 700; color: #0a2540; }
    .q-detail { font-size: 0.8rem; color: #56748c; margin-top: 4px; }
    .q-content {
      padding-left: 0.5rem;
      border-left: 3px solid #cbdae6;
      margin: 0.5rem 0;
    }
    .q-text {
      font-size: 1rem;
      color: #1e3b5c;
      line-height: 1.6;
    }
    .q-text img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 8px 0;
    }
    mjx-container { font-size: 1rem; margin: 0 2px; }
    .options { display: flex; gap: 2rem; flex-wrap: wrap; }
    .option-item { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .option-item input[type="radio"] {
      appearance: none; width: 20px; height: 20px; border: 2px solid #b7cadf;
      border-radius: 50%; transition: 0.1s; cursor: pointer;
    }
    .option-item input[type="radio"]:checked {
      border-color: #1a73e8; background-color: #1a73e8;
      box-shadow: inset 0 0 0 5px white, 0 0 0 1px #1a73e8;
    }
    
    .report-section { margin-top: 2rem; background: #f9fcff; border-radius: 24px; padding: 1.8rem; border: 1px solid #dbe6f0; }
    .radars-container {
      display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: space-around; margin-top: 1.5rem;
    }
    .radar-item {
      flex: 1 1 280px; min-width: 260px; background: white; border-radius: 20px;
      padding: 1rem 0.5rem; box-shadow: 0 4px 10px rgba(0,0,0,0.02); border: 1px solid #e2eaf3;
    }
    .radar-item h4 { text-align: center; margin-bottom: 0.5rem; color: #1e3b5c; font-weight: 600; }
    .score-summary { margin-top: 1.5rem; padding: 1rem; background: #eef3fa; border-radius: 16px; }
    
    .action-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; border-top: 1px solid #dde5ed; padding-top: 2rem; }
    .btn-submit { background: #0a2540; color: white; padding: 16px 36px; border-radius: 60px; font-weight: 600; border: none; cursor: pointer; }
    .email-badge { background: #eef4ff; padding: 8px 18px; border-radius: 40px; }
    .footer-note { margin-top: 1rem; color: #7b95af; text-align: right; }
    
    .button-group { display: flex; gap: 10px; align-items: center; }
    .student-info-row { display: flex; flex-wrap: wrap; gap: 1rem 1.5rem; align-items: flex-end; margin-bottom: 0.5rem; }
    .student-info-row .filter-group { min-width: 100px; }

    .gs-url-input {
      flex: 1;
      min-width: 300px;
      padding: 10px 14px;
      border: 1.5px solid #cbdae6;
      border-radius: 16px;
      background: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
    }
    .action-bar .button-group {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

          <option value="13">13</option><option value="14">14</option><option value="15">15</option>
          <option value="16">16</option><option value="17">17</option><option value="18">18</option>
          <option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option><option value="25">25</option><option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="29">29</option><option value="30">30</option>

  <div class="stats-info"><span id="statsDisplay">当前题库: 共 <span id="totalCount">0</span> 题</span></div>
  
  <!-- 答题卡 -->
  <div class="questions-wrapper">
    <form id="answerForm"><div class="questions-panel" id="questionsContainer"></div></form>

  <!-- 报告区域 -->
  <div class="report-section">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h3 style="font-weight: 600;">📊 三维能力雷达 (难度 · 题型 · 年级 Form 1-6)</h3>
      <div class="button-group">

<script src="questionBank.js"></script>

<script>
  (function(){
    "use strict";

    let masterBank = [...DEFAULT_BANK];
    const questionHtmlMap = new Map(); // 可在questionBank.js中填充
    
    let globalLevels = [];
    let globalTypes = [];
    const GRADE_LABELS = ['Form 1', 'Form 2', 'Form 3', 'Form 4', 'Form 5', 'Form 6'];

    // DOM 元素
    const modeYearlyBtn = document.getElementById('modeYearlyBtn');
    const modeRandomBtn = document.getElementById('modeRandomBtn');
    const yearlyYearGroup = document.getElementById('yearlyYearGroup');
    const yearlyYearSelect = document.getElementById('yearlyYearSelect');
    const chapterFilter = document.getElementById('chapterFilter');
    const chapterDatalist = document.getElementById('chapterDatalist');
    const refreshBtn = document.getElementById('refreshQuestionsBtn');
    const questionsContainer = document.getElementById('questionsContainer');
    const totalSpan = document.getElementById('totalCount');
    const statsDisplay = document.getElementById('statsDisplay');
    const generateReportBtn = document.getElementById('generateReportBtn');
    const exportHtmlReportBtn = document.getElementById('exportHtmlReportBtn');
    const analysisDisplay = document.getElementById('analysisDisplay');
    const analysisNote = document.getElementById('analysisNote');
    const scoreSummaryDiv = document.getElementById('scoreSummaryText');
    const emailSubmitBtn = document.getElementById('emailSubmitBtn');
    const studentName = document.getElementById('studentName');
    const academicYear = document.getElementById('academicYear');
    const classSelect = document.getElementById('classSelect');
    const studentID = document.getElementById('studentID');
    const googleSheetUrl = document.getElementById('googleSheetUrl');
    const googleSheetSubmitBtn = document.getElementById('googleSheetSubmitBtn');

    let currentMode = 'yearly';
    let currentQuestions = [];
    let chartLevel = null, chartType = null, chartForm = null;
    let lastStats = null;

    function extractGlobalDimensions() {
      const levelsSet = new Set();
      const typesSet = new Set();
      masterBank.forEach(q => {
        if (q.level) levelsSet.add(q.level);
        if (q.typeCode) typesSet.add(q.typeCode);
      });
      globalLevels = Array.from(levelsSet).sort((a, b) => a - b);
      globalTypes = Array.from(typesSet).sort((a, b) => a.localeCompare(b));
    }

    function extractGradeFromChapter(chapterMain) {
      if (!chapterMain) return null;
      const match = chapterMain.match(/F\.(\d+)/i);
      if (match) {
        const num = parseInt(match[1]);
        if (num >= 1 && num <= 6) return `Form ${num}`;
      }
      return null;
    }

    function populatePaperYearDropdowns() {
      const years = [...new Set(masterBank.map(q => q.year))].sort((a, b) => a - b);
      if (years.length === 0) return;
      yearlyYearSelect.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join('');
      yearlyYearSelect.value = years[years.length - 1];
    }

    function populateStudentAcademicYear() {
      const startYear = 2024;
      const endYear = 2027;
      let options = '';
      for (let y = startYear; y <= endYear; y++) {
        const label = `${String(y).slice(2)}-${String(y+1).slice(2)}`;
        options += `<option value="${y}-${y+1}">${label}</option>`;
      }
      academicYear.innerHTML = options;
    }

    function setMode(mode) {
      currentMode = mode;
      if (mode === 'yearly') {
        modeYearlyBtn.classList.add('active');
        modeRandomBtn.classList.remove('active');
        yearlyYearGroup.classList.remove('hidden');
        refreshBtn.textContent = '📋 生成完整试卷';
      } else {
        modeRandomBtn.classList.add('active');
        modeYearlyBtn.classList.remove('active');
        yearlyYearGroup.classList.add('hidden');
        refreshBtn.textContent = '🎲 随机抽5题';
      }
      refreshQuestions();
    }

    function rebuildFilters() {
      populatePaperYearDropdowns();
      const chapters = [...new Set(masterBank.map(q => q.chapterMain).filter(c => c && c!=='Out sys'))].sort();
      chapterDatalist.innerHTML = chapters.map(c => `<option value="${c}">`).join('');
      updateStats();
    }

    function getFilteredBank() {
      const query = chapterFilter.value.trim().toLowerCase();
      let filtered = masterBank;
      if (currentMode === 'yearly') {
        const selectedYear = parseInt(yearlyYearSelect.value) || 0;
        filtered = filtered.filter(q => q.year === selectedYear);
      }
      // 随机模式：不过滤年份，使用全部题库
      if (query) {
        filtered = filtered.filter(q => 
          (q.chapterMain || '').toLowerCase().includes(query) || 
          (q.chapter2 || '').toLowerCase().includes(query)
        );
      }
      return filtered;
    }

    function updateStats() {
      const filtered = getFilteredBank();
      totalSpan.textContent = filtered.length;
      if (currentMode === 'yearly') {
        const yearVal = yearlyYearSelect.value || '?';
        statsDisplay.innerHTML = `📅 年度完整试卷 · ${yearVal} 年 · 共 ${filtered.length} 题`;
      } else {
        statsDisplay.innerHTML = `🎲 随机抽题 · 全部年份 · 题库共 ${filtered.length} 题 (每次抽5题)`;
      }
    }

    function selectQuestions(bank) {
      if (currentMode === 'yearly') {
        return [...bank].sort((a, b) => a.number - b.number);
      } else {
        if (!bank.length) return [];
        const shuffled = [...bank];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, Math.min(5, shuffled.length));
      }
    }

    function renderQuestions(questions) {
      currentQuestions = questions;
      let html = '';
      questions.forEach((q, idx) => {
        const grade = extractGradeFromChapter(q.chapterMain) || '未知';
        const questionHtml = questionHtmlMap.get(q.id) || '';
        html += `<div class="question-card">`;
        html += `<div class="q-header">`;
        html += `<div class="q-meta"><div class="q-tag">Q${idx+1} · ${q.year} 原题号 #${q.number}</div><div class="q-detail">📌 ${q.chapterMain} · ${grade} · Lv.${q.level} · ${q.typeCode}</div></div>`;
        html += `<div class="options" role="radiogroup">`;
        ['A','B','C','D'].forEach(opt => {
          html += `<div class="option-item"><input type="radio" id="${q.id}_${opt}" name="q_${q.id}" value="${opt}"><label for="${q.id}_${opt}">${opt}</label></div>`;
        });
        html += `</div></div>`;
        if (questionHtml) {
          html += `<div class="q-content"><div class="q-text">${questionHtml}</div></div>`;
        } else {
          html += `<div class="q-content" style="color:#999; font-style:italic;">⚠️ 题目内容未加载 (请在questionBank.js中填充questionHtmlMap)</div>`;
        }
        html += `</div>`;
      });
      questionsContainer.innerHTML = html || '<p>⚠️ 没有符合条件的题目，请调整筛选条件。</p>';
      if (window.MathJax) {
        MathJax.typesetPromise([questionsContainer]).catch(console.warn);
      }
    }

    function refreshQuestions() {
      const filtered = getFilteredBank();
      const selected = selectQuestions(filtered);
      renderQuestions(selected);
      analysisDisplay.style.display = 'none';
      analysisNote.style.display = 'none';
      updateStats();
    }

    function collectAnswers() {
      const answers = {};
      currentQuestions.forEach(q => {
        const radios = document.getElementsByName(`q_${q.id}`);
        let selected = null;
        for(let r of radios) if(r.checked) { selected = r.value; break; }
        answers[q.id] = { user: selected || '', correct: q.answer, meta: q };
      });
      return answers;
    }

    function computeFixedDimensionStats(answerMap) {
      const levelStats = new Map();
      const typeStats = new Map();
      const gradeStats = new Map();
      globalLevels.forEach(l => levelStats.set(l, { correct: 0, total: 0 }));
      globalTypes.forEach(t => typeStats.set(t, { correct: 0, total: 0 }));
      GRADE_LABELS.forEach(g => gradeStats.set(g, { correct: 0, total: 0 }));
      Object.values(answerMap).forEach(item => {
        const q = item.meta;
        const isCorrect = (item.user === item.correct);
        const lvl = q.level;
        if (levelStats.has(lvl)) { const stat = levelStats.get(lvl); stat.total++; if (isCorrect) stat.correct++; }
        const tc = q.typeCode;
        if (typeStats.has(tc)) { const stat = typeStats.get(tc); stat.total++; if (isCorrect) stat.correct++; }
        const grade = extractGradeFromChapter(q.chapterMain);
        if (grade && gradeStats.has(grade)) { const stat = gradeStats.get(grade); stat.total++; if (isCorrect) stat.correct++; }
      });
      const levelLabels = globalLevels.map(l => `Lv.${l}`);
      const levelData = globalLevels.map(l => { const s = levelStats.get(l); return s.total ? (s.correct / s.total) * 100 : 0; });
      const typeLabels = [...globalTypes];
      const typeData = globalTypes.map(t => { const s = typeStats.get(t); return s.total ? (s.correct / s.total) * 100 : 0; });
      const gradeLabels = GRADE_LABELS;
      const gradeData = GRADE_LABELS.map(g => { const s = gradeStats.get(g); return s.total ? (s.correct / s.total) * 100 : 0; });
      return { levelLabels, levelData, typeLabels, typeData, gradeLabels, gradeData };
    }

    function renderRadars(stats) {
      const ctxLevel = document.getElementById('radarLevel').getContext('2d');
      const ctxType = document.getElementById('radarType').getContext('2d');
      const ctxForm = document.getElementById('radarForm').getContext('2d');
      if(chartLevel) chartLevel.destroy();
      if(chartType) chartType.destroy();
      if(chartForm) chartForm.destroy();
      const baseOpt = { scales: { r: { beginAtZero: true, max: 100, ticks: { stepSize: 20 } } }, plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toFixed(1)}%` } } }, animation: { duration: 0 } };
      chartLevel = new Chart(ctxLevel, { type: 'radar', data: { labels: stats.levelLabels, datasets: [{ label: '正确率 %', data: stats.levelData, backgroundColor: 'rgba(26,115,232,0.2)', borderColor: '#1a73e8' }] }, options: baseOpt });
      chartType = new Chart(ctxType, { type: 'radar', data: { labels: stats.typeLabels, datasets: [{ label: '正确率 %', data: stats.typeData, backgroundColor: 'rgba(46,125,50,0.2)', borderColor: '#2e7d32' }] }, options: baseOpt });
      chartForm = new Chart(ctxForm, { type: 'radar', data: { labels: stats.gradeLabels, datasets: [{ label: '正确率 %', data: stats.gradeData, backgroundColor: 'rgba(183,28,28,0.2)', borderColor: '#b71c1c' }] }, options: baseOpt });
    }

    function updateSummary(answerMap, stats) {
      const name = studentName.value || '未填';
      const sid = studentID.value || '未填';
      const cls = classSelect.value || '未填';
      const year = academicYear.options[academicYear.selectedIndex]?.text || '未填';
      let correct = 0, total = Object.keys(answerMap).length;
      Object.values(answerMap).forEach(v => { if(v.user === v.correct) correct++; });
      let html = `<div style="font-weight:700;">📋 总正确: ${correct}/${total}</div>`;
      html += `<div style="display:flex; flex-wrap:wrap; gap:20px; margin-top:10px;">`;
      html += `<div><strong>难度:</strong> ${stats.levelLabels.map((l,i)=> `${l} ${stats.levelData[i].toFixed(0)}%`).join(' · ')}</div>`;
      html += `<div><strong>题型:</strong> ${stats.typeLabels.map((l,i)=> `${l} ${stats.typeData[i].toFixed(0)}%`).join(' · ')}</div>`;
      html += `<div><strong>年级:</strong> ${stats.gradeLabels.map((l,i)=> `${l} ${stats.gradeData[i].toFixed(0)}%`).join(' · ')}</div>`;
      html += `</div><div style="margin-top:12px;">👤 ${name} · 🆔 ${sid} · 🏫 ${cls} · 📅 ${year}</div>`;
      scoreSummaryDiv.innerHTML = html;
    }

    function downloadPNG(canvasId, fileName) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const link = document.createElement('a');
      link.download = fileName;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function downloadExcel(answerMap, stats) {
      const name = studentName.value.trim() || '未命名';
      const sid = studentID.value.trim() || 'noID';
      const cls = classSelect.value || '';
      const yearLabel = academicYear.options[academicYear.selectedIndex]?.text || '';
      const fileName = `${name}_${sid}_${cls}_${yearLabel}_报告.xlsx`;
      const wb = XLSX.utils.book_new();
      const wsData = [['姓名', name], ['学号', sid], ['班级', cls], ['学生学年', yearLabel], ['日期', new Date().toLocaleDateString()], [], ['题目ID', '试卷年份', '你的答案', '正确答案', '结果']];
      Object.entries(answerMap).forEach(([id, item]) => { wsData.push([id, item.meta.year, item.user, item.correct, item.user === item.correct ? '✔' : '✘']); });
      wsData.push([], ['难度分析']); stats.levelLabels.forEach((l,i) => wsData.push([l, stats.levelData[i].toFixed(1)+'%']));
      wsData.push([], ['题型分析']); stats.typeLabels.forEach((l,i) => wsData.push([l, stats.typeData[i].toFixed(1)+'%']));
      wsData.push([], ['年级分析']); stats.gradeLabels.forEach((l,i) => wsData.push([l, stats.gradeData[i].toFixed(1)+'%']));
      const ws = XLSX.utils.aoa_to_sheet(wsData);
      XLSX.utils.book_append_sheet(wb, ws, "答题数据");
      XLSX.writeFile(wb, fileName);
    }

    function generateReport() {
      if(!currentQuestions.length) { alert('没有题目'); return; }
      const answerMap = collectAnswers();
      const stats = computeFixedDimensionStats(answerMap);
      lastStats = stats;
      analysisDisplay.style.display = 'block';
      analysisNote.style.display = 'block';
      renderRadars(stats);
      updateSummary(answerMap, stats);
      const name = studentName.value.trim() || '未命名';
      const sid = studentID.value.trim() || 'noID';
      const cls = classSelect.value || '';
      const yearLabel = academicYear.options[academicYear.selectedIndex]?.text || '';
      const baseName = `${name}_${sid}_${cls}_${yearLabel}`;
      setTimeout(() => {
        downloadExcel(answerMap, stats);
        downloadPNG('radarLevel', `${baseName}_难度雷达图.png`);
        downloadPNG('radarType', `${baseName}_题型雷达图.png`);
        downloadPNG('radarForm', `${baseName}_年级雷达图.png`);
      }, 200);
    }

    function exportHtmlReport() {
      if(!currentQuestions.length) { alert('没有题目'); return; }
      if (!lastStats) { generateReport(); }
      const answerMap = collectAnswers();
      const stats = lastStats || computeFixedDimensionStats(answerMap);
      const name = studentName.value.trim() || '未命名';
      const sid = studentID.value.trim() || 'noID';
      const cls = classSelect.value || '';
      const yearLabel = academicYear.options[academicYear.selectedIndex]?.text || '';
      const dateStr = new Date().toLocaleDateString();
      let correct = 0, total = Object.keys(answerMap).length;
      Object.values(answerMap).forEach(v => { if(v.user === v.correct) correct++; });
      const canvasLevel = document.getElementById('radarLevel');
      const canvasType = document.getElementById('radarType');
      const canvasForm = document.getElementById('radarForm');
      const imgLevel = canvasLevel ? canvasLevel.toDataURL('image/png') : '';
      const imgType = canvasType ? canvasType.toDataURL('image/png') : '';
      const imgForm = canvasForm ? canvasForm.toDataURL('image/png') : '';
      let detailRows = '';
      Object.entries(answerMap).forEach(([id, item]) => { const q = item.meta; detailRows += `<tr><td>${id}</td><td>${q.year} #${q.number}</td><td>${item.user || '未选'}</td><td>${item.correct}</td><td>${item.user === item.correct ? '✔' : '✘'}</td></tr>`; });
      let levelRows = ''; stats.levelLabels.forEach((l, i) => { levelRows += `<tr><td>${l}</td><td>${stats.levelData[i].toFixed(1)}%</td></tr>`; });
      let typeRows = ''; stats.typeLabels.forEach((l, i) => { typeRows += `<tr><td>${l}</td><td>${stats.typeData[i].toFixed(1)}%</td></tr>`; });
      let gradeRows = ''; stats.gradeLabels.forEach((l, i) => { gradeRows += `<tr><td>${l}</td><td>${stats.gradeData[i].toFixed(1)}%</td></tr>`; });
      const htmlContent = `<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>📊 数学能力分析报告 - ${name} ${sid}</title><style>body { font-family: 'Inter', sans-serif; background: #f4f7fc; padding: 2rem; } .report-container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 24px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); } h1 { color: #0a2540; border-bottom: 2px solid #2b6eb3; padding-bottom: 0.5rem; } .info-bar { display: flex; gap: 2rem; flex-wrap: wrap; background: #eef4ff; padding: 1rem 1.5rem; border-radius: 16px; margin: 1.5rem 0; } .score-overview { font-size: 1.5rem; font-weight: 700; color: #1a5d9c; } .charts-container { display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: center; margin: 2rem 0; } .chart-card { flex: 1 1 300px; background: #f9fcff; border-radius: 20px; padding: 1rem; text-align: center; border: 1px solid #dbe6f0; } .chart-card img { max-width: 100%; height: auto; border-radius: 12px; } table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); } th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e2e9f2; } th { background: #0a2540; color: white; font-weight: 600; } tr:hover { background: #f5f9ff; } .footer-note { margin-top: 2rem; text-align: right; color: #7b95af; font-size: 0.9rem; }</style></head><body><div class="report-container"><h1>📋 数学能力分析报告</h1><div class="info-bar"><div><strong>姓名：</strong> ${name}</div><div><strong>学号：</strong> ${sid}</div><div><strong>班级：</strong> ${cls}</div><div><strong>学生学年：</strong> ${yearLabel}</div><div><strong>日期：</strong> ${dateStr}</div></div><div class="score-overview">📊 总成绩：${correct} / ${total} (正确率 ${((correct/total)*100).toFixed(1)}%)</div><h2>📈 三维能力雷达图</h2><div class="charts-container"><div class="chart-card"><h3>🎯 难度等级正确率</h3><img src="${imgLevel}" alt="难度雷达图"></div><div class="chart-card"><h3>🏷️ 题型正确率</h3><img src="${imgType}" alt="题型雷达图"></div><div class="chart-card"><h3>📐 年级正确率 (Form 1-6)</h3><img src="${imgForm}" alt="年级雷达图"></div></div><h2>📝 答题明细</h2><table><thead><tr><th>题目ID</th><th>试卷年份/题号</th><th>你的答案</th><th>正确答案</th><th>结果</th></tr></thead><tbody>${detailRows}</tbody></table><h2>📊 维度分析</h2><div style="display: flex; gap: 2rem; flex-wrap: wrap;"><div style="flex:1;"><h3>难度等级</h3><table><thead><tr><th>等级</th><th>正确率</th></tr></thead><tbody>${levelRows}</tbody></table></div><div style="flex:1;"><h3>题型</h3><table><thead><tr><th>题型代码</th><th>正确率</th></tr></thead><tbody>${typeRows}</tbody></table></div><div style="flex:1;"><h3>年级</h3><table><thead><tr><th>年级</th><th>正确率</th></tr></thead><tbody>${gradeRows}</tbody></table></div></div><div class="footer-note">⚡ 报告生成于 ${new Date().toLocaleString()}</div></div></body></html>`;
      const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
      const link = document.createElement('a');
      link.download = `${name}_${sid}_${cls}_${yearLabel}_分析报告.html`;
      link.href = URL.createObjectURL(blob);
      link.click();
      URL.revokeObjectURL(link.href);
      alert('✅ HTML 报告已下载，您可以直接打开查看。');
    }

    function submitToEmail() {
      const name = studentName.value.trim();
      const sid = studentID.value.trim();
      const cls = classSelect.value;
      const yearLabel = academicYear.options[academicYear.selectedIndex]?.text || '';
      if(!name||!sid) { alert('请填写姓名和学号'); return; }
      if(!currentQuestions.length) { alert('没有题目可提交'); return; }
      const form = document.createElement('form');
      form.action = 'https://formsubmit.co/yh@ktmc.edu.hk';
      form.method = 'POST'; form.target = '_blank';
      form.innerHTML = `<input type="hidden" name="_subject" value="📬 练习提交 (${currentMode})"><input type="hidden" name="_captcha" value="false"><input type="hidden" name="_template" value="table"><input type="hidden" name="Student Name" value="${name}"><input type="hidden" name="Student ID" value="${sid}"><input type="hidden" name="Class" value="${cls}"><input type="hidden" name="Academic Year" value="${yearLabel}">`;
      const answers = collectAnswers();
      Object.entries(answers).forEach(([id,item],idx) => {
        const inp = document.createElement('input'); inp.type = 'hidden';
        inp.name = `Q${idx+1} (${item.meta.year} ${item.meta.chapterMain})`; inp.value = `${item.user||'未选'} (正确:${item.correct})`;
        form.appendChild(inp);
      });
      document.body.appendChild(form); form.submit(); document.body.removeChild(form);
      alert('邮件已发送。');
    }

    function submitToGoogleSheet() {
      const url = googleSheetUrl.value.trim();
      if (!url) { alert('请粘贴 Google Apps Script Web App URL'); return; }
      const name = studentName.value.trim() || '未填';
      const sid = studentID.value || '未填';
      const cls = classSelect.value || '未填';
      const yearLabel = academicYear.options[academicYear.selectedIndex]?.text || '未填';
      if (!currentQuestions.length) { alert('没有题目可提交'); return; }
      const answerMap = collectAnswers();
      let correctCount = 0, totalCount = Object.keys(answerMap).length;
      Object.values(answerMap).forEach(v => { if(v.user === v.correct) correctCount++; });
      const payload = { name, studentId: sid, class: cls, academicYear: yearLabel, correctCount, totalCount, answers: answerMap, timestamp: new Date().toISOString() };
      fetch(url, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
        .then(() => alert('✅ 已发送提交请求（请检查 Google Sheets 确认是否写入成功）'))
        .catch(err => alert('❌ 发送失败：' + err.message));
    }

    // 事件绑定
    modeYearlyBtn.addEventListener('click', () => setMode('yearly'));
    modeRandomBtn.addEventListener('click', () => setMode('random'));
    refreshBtn.addEventListener('click', refreshQuestions);
    yearlyYearSelect.addEventListener('change', updateStats);
    chapterFilter.addEventListener('input', updateStats);
    generateReportBtn.addEventListener('click', generateReport);
    exportHtmlReportBtn.addEventListener('click', exportHtmlReport);
    emailSubmitBtn.addEventListener('click', submitToEmail);
    googleSheetSubmitBtn.addEventListener('click', submitToGoogleSheet);

    function init() {
      populateStudentAcademicYear();
      extractGlobalDimensions();
      rebuildFilters();
      setMode('yearly');
    }
    document.addEventListener('DOMContentLoaded', init);
  })();
</script>
</body>
</html>
